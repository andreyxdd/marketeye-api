name: pytest

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: marketeye_test
          POSTGRES_USER: marketeye
          POSTGRES_PASSWORD: marketeye
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://marketeye:marketeye@localhost:5432/marketeye_test
      MONGO_URI: mongodb://localhost:27017
      REDIS_URI: redis://localhost:6379/1
      MONGO_DB_NAME: marketeye_test

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ --ignore=tests/calc/test_providers --ignore=tests/pipeline -v
