name: test api

on:
  schedule:
    # at 23:00 (UTC or 19:00 NY) on every day-of-week - from Monday through Friday
    - cron: "0 2 * * 2-6"
  workflow_dispatch:

jobs:
  test-api-job:
    runs-on: ubuntu-22.04
    environment: marketeye-api
    steps:
      - name: Checkout repository content
        uses: actions/checkout@v2

      - name: Setup Python Version
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests python-dotenv pytz pandas

      - name: Execute Python script
        env:
          API_KEY: ${{ secrets.API_KEY }}
          PING_URL: ${{ secrets.PING_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python test-api.py
