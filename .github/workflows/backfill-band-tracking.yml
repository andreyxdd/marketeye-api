name: backfill-band-tracking

on:
  workflow_dispatch:
    inputs:
      trading_days:
        description: "Published sessions per market"
        required: false
        default: "15"
        type: string
      dry_run:
        description: "If true, pass --dry-run"
        required: false
        default: "false"
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-latest
    environment: marketeye-api
    env:
      API_KEY: ${{ secrets.API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      MI_BASE_URL: ${{ secrets.MI_BASE_URL }}
      MI_SP500_CODE: ${{ secrets.MI_SP500_CODE }}
      MI_SP500_DATASET: ${{ secrets.MI_SP500_DATASET }}
      MI_VIX_CODE: ${{ secrets.MI_VIX_CODE }}
      MI_VIX_DATASET: ${{ secrets.MI_VIX_DATASET }}
      MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
      MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
      MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
      PING_URL: ${{ secrets.PING_URL }}
      QUANDL_API_KEY: ${{ secrets.QUANDL_API_KEY }}
      QUANDL_RATE_LIMIT: ${{ secrets.QUANDL_RATE_LIMIT }}
      QUANDL_SLEEP_MINUTES: ${{ secrets.QUANDL_SLEEP_MINUTES }}
      USER_AGENT: ${{ secrets.USER_AGENT }}
      DATE_TO_SCRAPE: ${{ secrets.DATE_TO_SCRAPE }}
      YAHOO_BASE_FCF_URL: ${{ secrets.YAHOO_BASE_FCF_URL }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
      REDIS_URI: ${{ secrets.REDIS_URI }}
      REDISCLOUD_URL: ${{ secrets.REDIS_URI }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Setup Python Version
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        run: |
          ARGS="--markets US,TO --trading-days ${{ inputs.trading_days }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/backfill_band_tracking.py $ARGS

      - name: Verify Micro frequencies nonempty
        if: ${{ inputs.dry_run == false }}
        run: |
          python - <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          import json

          ping_url = os.environ.get("PING_URL", "").rstrip("/")
          api_key = os.environ.get("API_KEY", "")
          if not ping_url or not api_key:
              print("PING_URL and API_KEY required", file=sys.stderr)
              sys.exit(1)

          def get_json(path: str, params: dict):
              qs = urllib.parse.urlencode({**params, "api_key": api_key})
              url = f"{ping_url}{path}?{qs}"
              req = urllib.request.Request(url, headers={"User-Agent": "backfill-band-tracking-verify"})
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return json.load(resp)

          def assert_nonempty_frequencies(market: str, price_band: str) -> None:
              dates = get_json("/api/analytics/get_dates", {"market": market})
              if not dates:
                  raise RuntimeError(f"{market}: empty get_dates payload")
              latest = dates[-1]["date_string"]
              criterion = "one_day_avg_mf"
              payload = get_json(
                  "/api/analytics/get_analytics_lists_by_criterion",
                  {
                      "market": market,
                      "date": latest,
                      "criterion": criterion,
                      "price_band": price_band,
                  },
              )
              rows = payload.get(criterion) or []
              nonempty = [
                  row
                  for row in rows
                  if isinstance(row.get("frequencies"), str) and row["frequencies"].strip()
              ]
              if not nonempty:
                  raise RuntimeError(
                      f"{market}/{price_band} date={latest}: zero rows with nonempty frequencies "
                      f"(rows={len(rows)})"
                  )
              print(
                  f"OK {market}/{price_band} date={latest}: "
                  f"{len(nonempty)}/{len(rows)} rows with nonempty frequencies"
              )

          try:
              assert_nonempty_frequencies("US", "lte5")
              assert_nonempty_frequencies("TO", "lte5")
          except (RuntimeError, urllib.error.URLError, KeyError, json.JSONDecodeError) as err:
              print(f"verify failed: {err}", file=sys.stderr)
              sys.exit(1)
          PY
