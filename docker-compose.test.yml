services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: marketeye_test
      POSTGRES_USER: marketeye
      POSTGRES_PASSWORD: marketeye
    ports:
      - "5432:5432"
